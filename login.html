<!doctype html>
<html lang="uk">
  <head>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body>
    <div class="card">
      <h1>Зареєструватися</h1>
      <p class="login-hint">
        Уже маєте обліковий запис? <a href="login.html">Увійти</a>
      </p>

      <div class="field">
        <label for="email">Електронна пошта</label>
        <input type="email" id="email" placeholder="Введіть електронну пошту" />
      </div>

      <div class="field">
        <label for="password">Пароль</label>
        <input type="password" id="password" placeholder="Введіть пароль" />
      </div>

      <button class="btn" type="button">Продовжити</button>
    </div>
  </body>
</html>

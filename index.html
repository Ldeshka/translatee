<!doctype html>
<html lang="en">
  <head>
    <link rel="stylesheet" href="src/style.css" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <div class="form">
      <input class="name-input" type="text" placeholder="name"></input>
      <input class="password-input" type="text" placeholder="password"></input>
      <button class="submit-btn"></button>
    </div>
    <article class="hide">
      <div class="border">
        <div style="display: flex">
          <select class="mova lang-from">
            <option value="UK">Українська</option>
            <option value="PL">Polska</option>
            <option value="EN">English</option>
          </select>
          <img
            class="strelochki"
            src="assets/Untitled 1.png"
            alt="strelochki"
          />
          <select class="mova lang-to">
            <option value="EN">English</option>
            <option value="UK">Українська</option>
            <option value="PL">Polska</option>
          </select>
        </div>
        <div style="display: flex; justify-content: space-around; gap: 50px">
          <textarea class="pole from"></textarea>

          <textarea class="pole to"></textarea>
        </div>
        <div></div>
      </div>
      <button class="trans-btn">Translate</button>
    </article>
    
    <script src="src/script.js"></script>
  </body>
</html>
